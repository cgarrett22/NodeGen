<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Node Editor</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
  background: #222;
  touch-action: none; 
  user-select: none;
  -webkit-user-select: none;
}

#bgLoader {
  position: fixed;
  top: 8px;
  right: 8px;
  z-index: 60;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 6px;
  border-radius: 6px;
  font-size: 10px;
}

#outputWrap {
  position: fixed;
  top: 48px;
  left: 8px;
  right: 8px;
  height: 160px;
  background: #000;
  border-radius: 8px;
  z-index: 100;
  display: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

#output {
  width: 100%;
  height: 100%;
  background: #000;
  color: #0f0;
  font-size: 11px;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 30px 10px 10px 10px;
  box-sizing: border-box;
  touch-action: auto !important;
  user-select: text !important;
  -webkit-user-select: text !important;
}

#closeOutput {
  position: absolute;
  top: 6px;
  right: 6px;
  z-index: 110;
  background: #900;
  color: white;
  border: none;
  border-radius: 4px;
  padding: 4px 10px;
  font-weight: bold;
}

#toolbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.92);
  padding: 8px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  z-index: 50;
}

button {
  padding: 8px;
  font-size: 11px;
  border-radius: 6px;
  border: none;
  background: #333;
  color: white;
}

button.active { background: #0a7cff; }
</style>
</head>

<body>

<input type="file" id="bgLoader" accept="image/*">

<div id="outputWrap">
  <button id="closeOutput" onclick="toggleOutput()">✖</button>
  <textarea id="output" spellcheck="false"></textarea>
</div>

<canvas id="c"></canvas>

<div id="toolbar">
<button id="btn-none" onclick="setMode('none')">Pan</button>
<button id="btn-add" onclick="setMode('add')">Add</button>
<button id="btn-connect" onclick="setMode('connect')">Link</button>
<button id="btn-move" onclick="setMode('move')">Move</button>
<button id="btn-delete" onclick="setMode('delete')">Del</button>
<button id="btn-tag" onclick="handleTagButton()">Tag</button>
<button id="btn-grid" onclick="toggleGrid()">Grid</button>
<button id="btn-snap" onclick="toggleSnap()">Snap</button>
<button onclick="fitImage()">Fit</button>
<button id="btn-shift" onclick="shrinkNodes()">Shift</button>



<button onclick="exportData()">Export</button>
<button onclick="importData()">Import</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const output = document.getElementById("output");
const wrap = document.getElementById("outputWrap");
const GAME_WIDTH = 1024;
const GAME_HEIGHT = 1536;
  
// --- INTERACTION FIXES ---
document.addEventListener("contextmenu", e => {
  if (e.target.closest("#outputWrap")) return;
  e.preventDefault();
}, { passive: false });

document.addEventListener("selectstart", e => {
  if (e.target.closest("#outputWrap")) return;
  e.preventDefault();
}, { passive: false });

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// --- STATE ---
let nodes = {};
let selected = null;
let mode = "none";
let grid = true;
let scale = 1;
let offsetX = 0;
let offsetY = 0;
let dragging = null;
let idCounter = 1;
let bgImage = null;
let fitOffsetMode = false;
let snapToGrid = false;
let importArmed = false;
let activeTag = "ladderExit";

const tagTypes = ["none", "ladderExit", "banana", "ice", "portal", "stopHere"];

// --- IMAGE LOADER ---
document.getElementById("bgLoader").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    bgImage = img;
    fitImage();
  };
  img.src = URL.createObjectURL(file);
});


// --- TOOL FUNCTIONS ---
function snap(v){ return Math.round(v/25)*25; }
function applySnap(x,y){ return snapToGrid ? {x:snap(x), y:snap(y)} : {x,y}; }

function setMode(m){
  mode = m;
  selected = null;
  updateButtons();
}

function handleTagButton() {
  if (mode !== "tag") {
    setMode("tag");
    return;
  }

  const i = tagTypes.indexOf(activeTag);
  activeTag = tagTypes[(i + 1) % tagTypes.length];
  updateButtons();
}

function cycleTag() {
  const i = tagTypes.indexOf(activeTag);
  activeTag = tagTypes[(i + 1) % tagTypes.length];

  mode = "tag"; // ← important
  updateButtons();
}

function toggleGrid(){ grid = !grid; updateButtons(); }
function toggleSnap(){ snapToGrid = !snapToGrid; updateButtons(); }
function toggleFitOffset(){ fitOffsetMode = !fitOffsetMode; fitImage(); updateButtons(); }

function toggleOutput() {
  wrap.style.display = (wrap.style.display === "none" || !wrap.style.display) ? "block" : "none";
  if (wrap.style.display === "none") importArmed = false;
}

function scaleNodes(nodes, scale, centerX, centerY) {
  const out = {};

  for (const id in nodes) {
    const n = nodes[id];
    out[id] = {
      ...n,
      x: Math.round(centerX + (n.x - centerX) * scale),
      y: Math.round(centerY + (n.y - centerY) * scale)
    };
  }

  return out;
}

function getNodeBoundsCenter(nodes) {
  const vals = Object.values(nodes);
  if (!vals.length) {
    return {
      centerX: GAME_WIDTH / 2,
      centerY: GAME_HEIGHT / 2
    };
  }

  const xs = vals.map(n => n.x);
  const ys = vals.map(n => n.y);

  return {
    centerX: (Math.min(...xs) + Math.max(...xs)) / 2,
    centerY: (Math.min(...ys) + Math.max(...ys)) / 2
  };
}

function getNodeBoundsTopLeft(nodes) {
  const vals = Object.values(nodes);
  if (!vals.length) {
    return { x: 0, y: 0 };
  }

  return {
    x: Math.min(...vals.map(n => n.x)),
    y: Math.min(...vals.map(n => n.y))
  };
}

function function shrinkNodes() {
  const { x, y } = getNodeBoundsTopLeft(nodes);
  nodes = scaleNodes(nodes, 0.92, x, y);
}
  
function updateButtons(){
  ["none","add","connect","move","delete", "tag"].forEach(m=>{
    const btn = document.getElementById("btn-"+m);
    if(btn) btn.classList.toggle("active", mode === m);
  });
  document.getElementById("btn-grid").classList.toggle("active", grid);
  document.getElementById("btn-shift").classList.toggle("active", fitOffsetMode);
  document.getElementById("btn-snap").classList.toggle("active", snapToGrid);
}

function fitImage(){
  scale = Math.min(canvas.width / GAME_WIDTH, canvas.height / GAME_HEIGHT);
  offsetX = (canvas.width - GAME_WIDTH * scale) / 2;
  offsetY = (canvas.height - GAME_HEIGHT * scale) / 2;
}

// --- DATA I/O ---
function exportData() {
  wrap.style.display = "block";
  output.readOnly = false;

  const lines = ["const levelNodes = {"];
  const ids = Object.keys(nodes);

  ids.forEach((id, i) => {
    const n = nodes[id];
    const uniqueNeighbors = [...new Set(n.neighbors || [])];
    const uniqueTags = [...new Set(n.tags || [])];

    const nbs = uniqueNeighbors.map(nb => `"${nb}"`).join(", ");
    const tags = uniqueTags.map(t => `"${t}"`).join(", ");

    lines.push(
      `  ${id}: { id: "${id}", x: ${Math.round(n.x)}, y: ${Math.round(n.y)}, neighbors: [${nbs}], tags: [${tags}] }${i < ids.length - 1 ? "," : ""}`
    );
  });

  lines.push("};");
  output.value = lines.join("\n");
  output.focus();
  output.select();

  try {
    document.execCommand("copy");
  } catch (err) {
    // ignore
  }
}

  function importData() {
  wrap.style.display = "block";

  if (!importArmed) {
    importArmed = true;
    output.readOnly = false;
    output.value = "";
    output.placeholder = "Paste nodes, then tap Import again";
    output.focus();
    return;
  }

  try {
    let text = output.value.trim()
      .replace(/const\s+\w+\s*=\s*/, "")
      .replace(/;$/, "");

    const parsed = eval("(" + text + ")");
    const source = parsed.nodes || parsed;

    nodes = {};
    for (const id in source) {
      nodes[id] = {
        id,
        x: source[id].x,
        y: source[id].y,
        neighbors: [...(source[id].neighbors || [])],
        tags: [...(source[id].tags || [])]
      };
    }

    idCounter = Object.keys(nodes).length + 1;
    importArmed = false;
    wrap.style.display = "none";
    alert("Import Success!");
  } catch (err) {
    alert("Import Failed");
    console.error(err);
  }
}

function world(x, y) {
  return {
    x: (x - offsetX) / scale,
    y: (y - offsetY) / scale
  };
}

function screen(x, y) {
  return {
    x: x * scale + offsetX,
    y: y * scale + offsetY
  };
}


canvas.addEventListener("pointerdown", e => {
  const p = world(e.clientX, e.clientY);
  const hit = Object.keys(nodes).find(
    id => Math.hypot(nodes[id].x - p.x, nodes[id].y - p.y) < 30
  );

  if (mode === "none") {
    dragging = "pan";
    return;
  }

  if (mode === "add") {
    const pt = applySnap(p.x, p.y);
    const id = "N" + idCounter++;
    nodes[id] = { id, x: pt.x, y: pt.y, neighbors: [], tags: [] };
    return;
  }

  if (mode === "connect" && hit) {
    if (!selected) {
      selected = hit;
    } else if (selected !== hit) {
      const a = nodes[selected];
      const b = nodes[hit];

      if (a.neighbors.includes(hit)) {
        a.neighbors = a.neighbors.filter(n => n !== hit);
        b.neighbors = b.neighbors.filter(n => n !== selected);
      } else {
        a.neighbors.push(hit);
        b.neighbors.push(selected);
      }

      navigator.vibrate?.(10);
      selected = null;
    }
    return;
  }

  if (mode === "move") {
    dragging = hit || "pan";
    return;
  }

  if (mode === "delete" && hit) {
    delete nodes[hit];
    Object.values(nodes).forEach(n => {
      n.neighbors = n.neighbors.filter(nb => nb !== hit);
    });
    return;
  }

  if (mode === "tag" && hit) {
    const n = nodes[hit];
    selected = hit;
    n.tags = n.tags || [];

    if (activeTag === "none") {
      n.tags = [];
      return;
    }

    if (n.tags.includes(activeTag)) {
      n.tags = n.tags.filter(t => t !== activeTag);
    } else {
      n.tags.push(activeTag);
    }
    return;
  }
});

canvas.addEventListener("pointermove", e=>{
  if(!dragging) return;

  if(dragging==="pan"){
    offsetX+=e.movementX;
    offsetY+=e.movementY;
  }else{
    const p=world(e.clientX,e.clientY);
    const pt=applySnap(p.x,p.y);
    nodes[dragging].x=pt.x;
    nodes[dragging].y=pt.y;
  }
})

canvas.addEventListener("pointerup", () => dragging = null);
canvas.addEventListener("wheel", e => {
  const zoom = e.deltaY < 0 ? 1.1 : 0.9;
  scale = Math.max(0.1, Math.min(10, scale * zoom));
});

function drawMagnifier(node) {
  const p = screen(node.x, node.y);

  const radius = 55;
  const zoom = 2.5;

  // place bubble above the node/finger
  let mx = p.x;
  let my = p.y - 95;

  // keep on screen
  if (mx < radius + 8) mx = radius + 8;
  if (mx > canvas.width - radius - 8) mx = canvas.width - radius - 8;
  if (my < radius + 8) my = p.y + 95;

  ctx.save();

  // clip circular lens
  ctx.beginPath();
  ctx.arc(mx, my, radius, 0, Math.PI * 2);
  ctx.clip();

  // lens background
  ctx.fillStyle = "#111";
  ctx.fillRect(mx - radius, my - radius, radius * 2, radius * 2);

  // draw magnified background patch
if (bgImage) {
  const bg = screen(0, 0);
  ctx.drawImage(
    bgImage,
    mx - (p.x - bg.x) * zoom,
    my - (p.y - bg.y) * zoom,
    GAME_WIDTH * scale * zoom,
    GAME_HEIGHT * scale * zoom
  );
}
  
  // draw magnified grid
  if (grid) {
    const step = 25 * scale * zoom;
    const startX = (mx - (p.x - offsetX) * zoom) % step;
    const startY = (my - (p.y - offsetY) * zoom) % step;

    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = 1;

    for (let x = startX; x < canvas.width + radius; x += step) {
      ctx.beginPath();
      ctx.moveTo(x, my - radius);
      ctx.lineTo(x, my + radius);
      ctx.stroke();
    }

    for (let y = startY; y < canvas.height + radius; y += step) {
      ctx.beginPath();
      ctx.moveTo(mx - radius, y);
      ctx.lineTo(mx + radius, y);
      ctx.stroke();
    }
  }

  // draw nearby connections magnified
  const drawn = new Set();
  Object.values(nodes).forEach(n => {
    n.neighbors.forEach(nbId => {
      const key = [n.id, nbId].sort().join("|");
      if (drawn.has(key) || !nodes[nbId]) return;

      const a0 = screen(n.x, n.y);
      const b0 = screen(nodes[nbId].x, nodes[nbId].y);

      const a = {
        x: mx + (a0.x - p.x) * zoom,
        y: my + (a0.y - p.y) * zoom
      };
      const b = {
        x: mx + (b0.x - p.x) * zoom,
        y: my + (b0.y - p.y) * zoom
      };

      ctx.shadowColor = "#00ffff";
      ctx.shadowBlur = 6;
      ctx.strokeStyle = (n.id === selected || nbId === selected) ? "#00ff99" : "#66ccff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.shadowBlur = 0;

      drawn.add(key);
    });
  });

  // draw magnified nodes
  Object.values(nodes).forEach(n => {
    const n0 = screen(n.x, n.y);
    const np = {
      x: mx + (n0.x - p.x) * zoom,
      y: my + (n0.y - p.y) * zoom
    };

    if (n.tags?.includes("banana")) ctx.fillStyle = "#ffff00";
else if (n.tags?.includes("ladderExit")) ctx.fillStyle = "#00ffff";
else if (n.tags?.includes("ice")) ctx.fillStyle = "#66ccff";
else ctx.fillStyle = (n.id === selected) ? "#00ff66" : "#fff";
    ctx.beginPath();
ctx.arc(np.x, np.y, 10, 0, Math.PI * 2);
ctx.fill();

    ctx.font = "10px Arial";
    ctx.fillText(n.id, np.x + 12, np.y + 4);
  });

  ctx.restore();

  // lens border
  ctx.save();
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(mx, my, radius, 0, Math.PI * 2);
  ctx.stroke();

  // crosshair
  ctx.strokeStyle = "#ff4444";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(mx - 12, my);
  ctx.lineTo(mx + 12, my);
  ctx.moveTo(mx, my - 12);
  ctx.lineTo(mx, my + 12);
  ctx.stroke();

  // coordinates below lens
  ctx.fillStyle = "#ffffff";
  ctx.font = "12px Arial";
  ctx.textAlign = "center";
  ctx.fillText(`${Math.round(node.x)}, ${Math.round(node.y)}`, mx, my + radius + 16);

if (snapToGrid) {
  const sx = Math.round(node.x / 25) * 25;
  const sy = Math.round(node.y / 25) * 25;

  ctx.fillStyle = "#ffff00";
  ctx.beginPath();
  ctx.arc(mx, my, 4, 0, Math.PI * 2);
  ctx.fill();
}

  ctx.restore();
}

function drawTagHUD() {
  if (mode !== "tag") return;

  ctx.save();

  const x = 10;
  const y = 10;
  const w = 260;
  const h = 78;

  ctx.fillStyle = "rgba(0,0,0,0.8)";
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = "#0a7cff";
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);

  let swatch = "#fff";
  if (activeTag === "banana") swatch = "#ffff00";
  else if (activeTag === "portal") swatch = "#ff66ff";
  else if (activeTag === "ice") swatch = "#66ccff";
  else if (activeTag === "ladderExit") swatch = "#00ffff";
  else if (activeTag === "stopHere") swatch = "#ff9966";
  else if (activeTag === "none") swatch = "#999999";

  ctx.fillStyle = "#fff";
  ctx.font = "13px Arial";
  ctx.fillText("Tag Mode", x + 10, y + 18);

  ctx.fillStyle = swatch;
  ctx.beginPath();
  ctx.arc(x + 18, y + 36, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#fff";
  ctx.fillText(`Active: ${activeTag}`, x + 32, y + 40);

  if (selected && nodes[selected]) {
    const tags = (nodes[selected].tags || []).join(", ") || "(none)";
    ctx.fillText(`Node: ${selected}`, x + 10, y + 60);
    ctx.fillText(`Tags: ${tags}`, x + 78, y + 60);
  }

  ctx.restore();
}

// --- DRAW ---
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

if (bgImage) {
  ctx.drawImage(bgImage, offsetX, offsetY, GAME_WIDTH * scale, GAME_HEIGHT * scale);
}
  if(grid){
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 1;
    for(let x = offsetX%(25*scale); x < canvas.width; x += 25*scale){
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    }
    for(let y = offsetY%(25*scale); y < canvas.height; y += 25*scale){
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
    }
  }

  const drawn = new Set();
  Object.values(nodes).forEach(n => {
    n.neighbors.forEach(nbId => {
      const key = [n.id, nbId].sort().join("|");
      if(drawn.has(key) || !nodes[nbId]) return;
      const a = screen(n.x, n.y), b = screen(nodes[nbId].x, nodes[nbId].y);
      ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 6;
      ctx.strokeStyle = (n.id===selected || nbId===selected) ? "#00ff99" : "#66ccff";
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      ctx.shadowBlur = 0;
      drawn.add(key);
    });
  });

Object.values(nodes).forEach(n => {
  const p = screen(n.x, n.y);

  const tagPriority = ["banana", "portal", "ice", "ladderExit", "stopHere"];
  const tag = tagPriority.find(t => n.tags?.includes(t));

  if (tag === "banana") ctx.fillStyle = "#ffff00";
  else if (tag === "portal") ctx.fillStyle = "#ff66ff";
  else if (tag === "ice") ctx.fillStyle = "#66ccff";
  else if (tag === "ladderExit") ctx.fillStyle = "#00ffff";
  else if (tag === "stopHere") ctx.fillStyle = "#ff9966";
  else ctx.fillStyle = (n.id === selected) ? "#00ff66" : "#fff";

  ctx.beginPath();
  ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
  ctx.fill();

  ctx.font = "20px Arial";
  ctx.fillText(n.id, p.x+12, p.y+4);
});

//////
if (dragging && dragging !== "pan" && nodes[dragging]) {
  drawMagnifier(nodes[dragging]);
}

drawTagHUD();
/////

  requestAnimationFrame(draw);
}
draw();
updateButtons();
</script>
</body>
</html>
